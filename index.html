<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Skillful Hands Solutions LTD — custom construction, renovations, decks, cottages, and landscaping on the Sunshine Coast, BC." />
    <meta name="theme-color" content="#12150F" />
    <!-- title подставляет dx из Dioxus.toml [web.app] title (иначе задвоится) -->
    <title></title>

    <!-- Шрифты бренда (из Pencil): Fraunces (display, serif) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta property="og:title" content="Skillful Hands Solutions LTD" />
    <meta property="og:type" content="website" />

    <!-- Анти-FOUC: WASM добавляет основной CSS только после загрузки/монтирования,
         поэтому без этого браузер на холодном старте успевает нарисовать
         неостилизованный HTML → вспышка и рывок. Критический инлайн-CSS сразу
         задаёт фон бренда и прячет контент; main.css (через asset!(), base-path-safe)
         снимает сокрытие — контент появляется уже остилизованным.
         Скрипт-подстраховка показывает контент через 3 c, если CSS не подгрузился. -->
    <style>
      html { background: #0E1410; }
      body { margin: 0; }
      #main { visibility: hidden; }
    </style>
    <script>
      setTimeout(function () {
        var m = document.getElementById("main");
        if (m) m.style.visibility = "visible";
      }, 3000);
    </script>
  </head>

  <body>
    <div id="main"></div>
  </body>
</html>
